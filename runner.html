<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Беги, зверюшка!</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(160deg, #a8edea 0%, #fed6e3 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  h1 {
    color: #fff;
    font-size: 1.9rem;
    font-weight: 800;
    text-shadow: 0 2px 10px rgba(0,0,0,0.18);
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  canvas {
    border-radius: 22px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.22);
    display: block;
    touch-action: none;
  }
  p {
    color: rgba(255,255,255,0.82);
    font-size: 0.88rem;
    margin-top: 12px;
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
</style>
</head>
<body>
<h1>🐰 Беги, зверюшка!</h1>
<canvas id="c"></canvas>
<p>Пробел / стрелка вверх / тап — прыжок (можно два раза!)</p>
<script>

// ╔══════════════════════════════════════════════════════════════╗
// ║  РИСУНКИ ДОЧКИ                                               ║
// ║  Когда нарисует — сфоткай, положи файлы рядом с runner.html  ║
// ║  и замени null на loadImg('имя_файла.png')                   ║
// ╠══════════════════════════════════════════════════════════════╣
let IMG_HERO = null;       // loadImg('zayka.png')   ← главный герой
let IMG_OBS1 = null;      // loadImg('luzha.png')   ← лужа
let IMG_OBS2 = loadImg('kust.png');  // дерево — рисунок дочки! 🎨
let IMG_OBS3 = null;      // loadImg('kamen.png')   ← камень
let IMG_BIRD = loadImg('bird.png');  // птичка — рисунок дочки! 🎨
// ╚══════════════════════════════════════════════════════════════╝

function loadImg(src) {
  const img = new Image(); img.src = src; return img;
}
function imgOk(img) {
  return img && img.complete && img.naturalWidth > 0;
}

// ── Размер холста ──────────────────────────────────────────────
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = Math.min(800, window.innerWidth - 24);
const H = 270;
cv.width = W; cv.height = H;

const GROUND = H - 54; // y поверхности земли

// ── Физика ─────────────────────────────────────────────────────
const GRAVITY  = 0.57;
const JUMP_SPD = -10.5;

// ── Виды препятствий (w/h — размер заглушки) ───────────────────
const OBS_TYPES = [
  { w:62, h:20 },  // 0 — лужа     (широкая, низкая)
  { w:54, h:54 },  // 1 — дерево   (квадрат, как рисунок)
  { w:44, h:40 },  // 2 — камень   (средний)
];

// ── Игровое состояние ──────────────────────────────────────────
let gs = 'wait'; // wait | run | dead
let score = 0, best = +localStorage.getItem('zb') || 0;
let speed = 0, gframe = 0;
let groundX = 0; // прокрутка узора земли

// ── Герой ──────────────────────────────────────────────────────
const hero = { x:90, y:GROUND, vy:0, onGround:true, jumps:2, legPhase:0, squash:1 };

// ── Препятствия ────────────────────────────────────────────────
let obstacles = [], spawnTimer = 0, spawnInterval = 90;
let birdTimer = 0, birdInterval = 200;
let spawnCooldown = 0; // общий кулдаун между любыми спавнами

// высоты полёта птиц (y верхнего края): низко / средне / высоко
const BIRD_HEIGHTS = [128, 100, 72];

// ── Облака ─────────────────────────────────────────────────────
const clouds = Array.from({length:5}, (_,i) => ({
  x: W * (0.05 + i*0.22) + Math.random()*50,
  y: 18 + Math.random()*45,
  r: 28 + Math.random()*28,
  sp: 0.15 + Math.random()*0.18,
}));

// ═══════════════════════════════════════════════════════════════
// РИСОВАНИЕ: заяц-заглушка
// ═══════════════════════════════════════════════════════════════
function drawHeroPlaceholder(x, y, onGround, legPhase, squash) {
  ctx.save();
  // squash / stretch: приседает при приземлении
  ctx.translate(x + 28, y + 62);
  ctx.scale(squash > 1 ? squash : 1/squash*0.85+0.15, squash < 1 ? squash : 1/squash*0.8+0.2);
  ctx.translate(-28, -62);

  // хвостик
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(4, 44, 9, 0, Math.PI*2); ctx.fill();

  // тело
  ctx.fillStyle = '#FFDDE2';
  ctx.beginPath(); ctx.ellipse(28, 44, 21, 22, 0, 0, Math.PI*2); ctx.fill();

  // голова
  ctx.beginPath(); ctx.arc(28, 20, 17, 0, Math.PI*2); ctx.fill();

  // уши
  [[-10, -0.18],[10, 0.18]].forEach(([dx, tilt]) => {
    ctx.save(); ctx.translate(28+dx, 10); ctx.rotate(tilt);
    ctx.fillStyle = '#FFDDE2';
    ctx.beginPath(); ctx.ellipse(0, -17, 7, 19, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#F48FB1';
    ctx.beginPath(); ctx.ellipse(0, -17, 3.5, 13, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // глаза
  [[-6, 18],[6, 18]].forEach(([dx, dy]) => {
    ctx.fillStyle = '#2D2D2D';
    ctx.beginPath(); ctx.arc(28+dx, dy, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(29+dx, dy-1.5, 1.5, 0, Math.PI*2); ctx.fill();
  });

  // нос + рот
  ctx.fillStyle = '#E91E63';
  ctx.beginPath(); ctx.arc(28, 24, 3, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#E91E63'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(28, 26.5, 4, 0.15, Math.PI-0.15); ctx.stroke();

  // лапки
  ctx.fillStyle = '#FFDDE2';
  if (onGround) {
    const sw = Math.sin(legPhase) * 12;
    [[15, sw], [38, -sw]].forEach(([lx, ly]) => {
      ctx.beginPath(); ctx.ellipse(lx, 56+ly, 7, 12, -0.2, 0, Math.PI*2); ctx.fill();
    });
  } else {
    // в прыжке лапки подобраны
    [[12, 46, 0.7],[44, 46, -0.7]].forEach(([lx,ly,r]) => {
      ctx.beginPath(); ctx.ellipse(lx, ly, 7, 12, r, 0, Math.PI*2); ctx.fill();
    });
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// РИСОВАНИЕ: препятствия-заглушки
// ═══════════════════════════════════════════════════════════════
function drawObsPlaceholder(o) {
  if (o.type === 0) {
    // лужа
    ctx.fillStyle = '#29B6F6';
    ctx.beginPath();
    ctx.ellipse(o.x+o.w/2, o.y+o.h/2+5, o.w/2, o.h/2+2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.42)';
    ctx.beginPath();
    ctx.ellipse(o.x+o.w*0.33, o.y+o.h*0.45, o.w*0.18, o.h*0.22, -0.3, 0, Math.PI*2);
    ctx.fill();
  } else if (o.type === 1) {
    // куст — несколько кругов
    [
      [o.x+o.w/2,   o.y+o.h*0.68, o.w*0.48, '#43A047'],
      [o.x+o.w*0.24, o.y+o.h*0.62, o.w*0.3,  '#388E3C'],
      [o.x+o.w*0.76, o.y+o.h*0.62, o.w*0.3,  '#388E3C'],
      [o.x+o.w/2,   o.y+o.h*0.36, o.w*0.3,  '#66BB6A'],
    ].forEach(([ex,ey,er,ec]) => {
      ctx.fillStyle = ec;
      ctx.beginPath(); ctx.arc(ex, ey, er, 0, Math.PI*2); ctx.fill();
    });
    // ствол
    ctx.fillStyle = '#795548';
    ctx.fillRect(o.x+o.w/2-4, o.y+o.h*0.8, 8, o.h*0.22);
  } else {
    // камень — органичная форма
    ctx.fillStyle = '#78909C';
    ctx.beginPath();
    ctx.moveTo(o.x+12, o.y+o.h);
    ctx.quadraticCurveTo(o.x,    o.y+o.h,   o.x+5,    o.y+o.h*0.58);
    ctx.quadraticCurveTo(o.x+o.w*0.2, o.y+2, o.x+o.w/2, o.y+3);
    ctx.quadraticCurveTo(o.x+o.w*0.8, o.y+2, o.x+o.w-5, o.y+o.h*0.58);
    ctx.quadraticCurveTo(o.x+o.w, o.y+o.h,  o.x+o.w-12, o.y+o.h);
    ctx.closePath(); ctx.fill();
    // блик
    ctx.fillStyle = '#90A4AE';
    ctx.beginPath();
    ctx.ellipse(o.x+o.w*0.4, o.y+o.h*0.28, o.w*0.22, o.h*0.12, -0.3, 0, Math.PI*2);
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════
// РИСОВАНИЕ: фон
// ═══════════════════════════════════════════════════════════════

function _stem(x, y, h) {
  ctx.strokeStyle = '#558B2F'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - h); ctx.stroke();
}

// Ромашка — белые лепестки, жёлтый центр
function flowerDaisy(x, y) {
  _stem(x, y, 15);
  const cy = y - 15;
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(x + Math.cos(a)*7, cy + Math.sin(a)*7, 2.5, 5, a, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = '#FFD600'; ctx.beginPath(); ctx.arc(x, cy, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#F9A825'; ctx.beginPath(); ctx.arc(x, cy, 2, 0, Math.PI*2); ctx.fill();
}

// Тюльпан — красный
function flowerTulip(x, y) {
  _stem(x, y, 18);
  const cy = y - 18;
  ctx.fillStyle = '#E53935';
  ctx.beginPath();
  ctx.moveTo(x - 7, cy + 4);
  ctx.bezierCurveTo(x - 9, cy - 10, x - 3, cy - 14, x, cy - 12);
  ctx.bezierCurveTo(x + 3, cy - 14, x + 9, cy - 10, x + 7, cy + 4);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#EF9A9A';
  ctx.beginPath(); ctx.ellipse(x, cy - 5, 3, 7, 0, 0, Math.PI*2); ctx.fill();
}

// Подсолнух — жёлтые лепестки, коричневый центр
function flowerSunflower(x, y) {
  _stem(x, y, 16);
  const cy = y - 16;
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2;
    ctx.fillStyle = i % 2 === 0 ? '#FFB300' : '#FFA000';
    ctx.beginPath(); ctx.ellipse(x + Math.cos(a)*8, cy + Math.sin(a)*8, 2.5, 5.5, a, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = '#4E342E'; ctx.beginPath(); ctx.arc(x, cy, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#6D4C41'; ctx.beginPath(); ctx.arc(x, cy, 3, 0, Math.PI*2); ctx.fill();
}

// Клевер — три зелёных листика
function flowerClover(x, y) {
  _stem(x, y, 13);
  const cy = y - 13;
  ctx.fillStyle = '#43A047';
  [[-5,-5],[5,-5],[0,-11]].forEach(([dx,dy]) => {
    ctx.beginPath(); ctx.arc(x+dx, cy+dy, 5.5, 0, Math.PI*2); ctx.fill();
  });
  ctx.fillStyle = '#66BB6A';
  [[-5,-5],[5,-5],[0,-11]].forEach(([dx,dy]) => {
    ctx.beginPath(); ctx.arc(x+dx+0.5, cy+dy-0.5, 2.5, 0, Math.PI*2); ctx.fill();
  });
}

// Мак — оранжевые лепестки
function flowerPoppy(x, y) {
  _stem(x, y, 15);
  const cy = y - 15;
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2;
    ctx.fillStyle = i % 2 === 0 ? '#FF5722' : '#FF7043';
    ctx.beginPath(); ctx.ellipse(x + Math.cos(a)*6, cy + Math.sin(a)*6, 4.5, 7, a, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = '#212121'; ctx.beginPath(); ctx.arc(x, cy, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFF176';
  for (let i = 0; i < 5; i++) {
    const a = (i/5)*Math.PI*2;
    ctx.beginPath(); ctx.arc(x+Math.cos(a)*2, cy+Math.sin(a)*2, 0.8, 0, Math.PI*2); ctx.fill();
  }
}

// Колокольчик — фиолетовый
function flowerBell(x, y) {
  _stem(x, y, 16);
  const cy = y - 16;
  // чашечка
  ctx.fillStyle = '#8E24AA';
  ctx.beginPath();
  ctx.moveTo(x - 7, cy);
  ctx.bezierCurveTo(x - 8, cy - 14, x + 8, cy - 14, x + 7, cy);
  ctx.bezierCurveTo(x + 4, cy + 4, x - 4, cy + 4, x - 7, cy);
  ctx.fill();
  ctx.fillStyle = '#CE93D8';
  ctx.beginPath(); ctx.ellipse(x, cy - 7, 4, 5, 0, 0, Math.PI*2); ctx.fill();
  // тычинка
  ctx.strokeStyle = '#F3E5F5'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, cy); ctx.lineTo(x, cy + 5); ctx.stroke();
  ctx.fillStyle = '#FFD54F'; ctx.beginPath(); ctx.arc(x, cy+5, 1.5, 0, Math.PI*2); ctx.fill();
}

const FLOWER_FNS = [flowerDaisy, flowerTulip, flowerSunflower, flowerClover, flowerPoppy, flowerBell];

function drawBackground() {
  // небо
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
  sky.addColorStop(0, '#81D4FA');
  sky.addColorStop(1, '#E1F5FE');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND);

  // облака
  clouds.forEach(c => {
    ctx.fillStyle = 'rgba(255,255,255,0.86)';
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c.x - c.r*0.5, c.y + c.r*0.25, c.r*0.65, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c.x + c.r*0.52, c.y + c.r*0.2,  c.r*0.6,  0, Math.PI*2); ctx.fill();
  });

  // трава
  const grass = ctx.createLinearGradient(0, GROUND, 0, H);
  grass.addColorStop(0,   '#66BB6A');
  grass.addColorStop(0.25,'#81C784');
  grass.addColorStop(1,   '#A5D6A7');
  ctx.fillStyle = grass;
  ctx.fillRect(0, GROUND, W, H - GROUND);

  // тёмная полоска границы
  ctx.fillStyle = '#558B2F';
  ctx.fillRect(0, GROUND, W, 5);

  // цветочки на земле (прокручиваются)
  for (let i = 0; i < 8; i++) {
    const fx = ((i * 105 - groundX * 0.6) % (W + 80) + W + 80) % (W + 80) - 40;
    FLOWER_FNS[i % FLOWER_FNS.length](fx, GROUND + 2);
  }
}

// ═══════════════════════════════════════════════════════════════
// РИСОВАНИЕ: HUD и оверлеи
// ═══════════════════════════════════════════════════════════════
function drawHUD() {
  ctx.fillStyle = 'rgba(50,50,80,0.75)';
  ctx.beginPath();
  ctx.roundRect(W - 120, 8, 112, best > 0 ? 52 : 34, 10);
  ctx.fill();

  ctx.fillStyle = '#FFD54F';
  ctx.font = 'bold 17px Segoe UI';
  ctx.textAlign = 'right';
  ctx.fillText('⭐ ' + Math.floor(score), W - 14, 28);

  if (best > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '12px Segoe UI';
    ctx.fillText('Рекорд: ' + Math.floor(best), W - 14, 48);
  }
}

function drawOverlay(emoji, line1, line2) {
  ctx.fillStyle = 'rgba(20,10,50,0.48)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  // карточка
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.roundRect(W/2-160, H/2-58, 320, 116, 18); ctx.fill();

  ctx.font = '36px serif';
  ctx.fillText(emoji, W/2, H/2 - 18);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px Segoe UI';
  ctx.fillText(line1, W/2, H/2 + 12);

  if (line2) {
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = '14px Segoe UI';
    ctx.fillText(line2, W/2, H/2 + 36);
  }
}

// ═══════════════════════════════════════════════════════════════
// ЛОГИКА
// ═══════════════════════════════════════════════════════════════
function spawnBird() {
  const y = BIRD_HEIGHTS[Math.floor(Math.random() * BIRD_HEIGHTS.length)];
  obstacles.push({ isBird: true, x: W + 8, y, w: 50, h: 42, wing: 0 });
  birdInterval = 150 + Math.random() * 110;
}

function resetGame() {
  hero.x = 90; hero.y = GROUND - 62; hero.vy = 0;
  hero.onGround = true; hero.jumps = 2; hero.legPhase = 0; hero.squash = 1;
  obstacles = []; spawnTimer = 0; spawnInterval = 140;
  birdTimer = 0; birdInterval = 200; spawnCooldown = 0;
  score = 0; speed = 3.0; gframe = 0; groundX = 0;
  gs = 'run';
}

function spawnObs() {
  const type = Math.floor(Math.random() * 3);
  const t = OBS_TYPES[type];
  const isDouble = score > 40 && Math.random() < 0.28;
  obstacles.push({ type, x: W + 8, y: GROUND - t.h, w: t.w, h: t.h });
  if (isDouble) {
    obstacles.push({ type, x: W + 8 + t.w + 10, y: GROUND - t.h, w: t.w, h: t.h });
  }
  spawnInterval = 80 + Math.random() * 60 + Math.max(0, 60 - score * 0.22) + (isDouble ? 35 : 0);
}

function checkCollision(o) {
  const pad = 9;
  return (hero.x + pad)       < (o.x + o.w) &&
         (hero.x + 50 - pad)  > o.x &&
         (hero.y + pad)       < (o.y + o.h) &&
         (hero.y + 62 - pad)  > o.y;
}

function jump() {
  if (gs === 'wait' || gs === 'dead') { resetGame(); return; }
  if (hero.jumps > 0) {
    hero.vy = JUMP_SPD * Math.sqrt(speed / 5.0);
    hero.onGround = false;
    hero.jumps--;
    hero.squash = 0.72;
  }
}

function update() {
  if (gs !== 'run') return;
  gframe++;
  score  += 0.07 + speed * 0.014;
  speed   = Math.min(10, 3.0 + score * 0.006);
  groundX += speed;

  // гравитация масштабируется со скоростью (высота прыжка остаётся постоянной)
  hero.vy += GRAVITY * (speed / 5.0);
  hero.y  += hero.vy;
  if (hero.y + 62 >= GROUND) {
    hero.y = GROUND - 62;
    if (!hero.onGround) hero.squash = 1.38;
    hero.vy = 0; hero.onGround = true; hero.jumps = 2;
  }
  if (hero.onGround) hero.legPhase += 0.28;
  // squash плавно возвращается к 1
  hero.squash += (1 - hero.squash) * 0.22;

  // облака
  clouds.forEach(c => { c.x -= c.sp; if (c.x + c.r * 2 < 0) c.x = W + c.r; });

  if (spawnCooldown > 0) spawnCooldown--;

  // наземные препятствия
  spawnTimer++;
  if (spawnTimer >= spawnInterval && spawnCooldown === 0) {
    spawnTimer = 0; spawnObs(); spawnCooldown = 90;
  }

  // птицы (появляются после счёта 60)
  if (score > 60) {
    birdTimer++;
    if (birdTimer >= birdInterval && spawnCooldown === 0) {
      birdTimer = 0; spawnBird(); spawnCooldown = 90;
    }
  }

  obstacles = obstacles.filter(o => {
    o.x -= o.isBird ? speed * 1.2 : speed;
    if (o.isBird) o.wing++;
    if (checkCollision(o)) {
      gs = 'dead';
      if (score > best) { best = score; localStorage.setItem('zb', Math.floor(best)); }
    }
    return o.x + o.w > -10;
  });
}

// ═══════════════════════════════════════════════════════════════
// РИСОВАНИЕ: птица-заглушка
// ═══════════════════════════════════════════════════════════════
function drawBirdPlaceholder(o) {
  const bx = o.x + o.w / 2, by = o.y + o.h / 2;
  const flap = Math.sin(o.wing * 0.18) * 8;

  // крыло
  ctx.fillStyle = '#FF6D00';
  ctx.beginPath();
  ctx.moveTo(bx - 4, by - 3);
  ctx.quadraticCurveTo(bx + 4, by - 16 + flap, bx + 18, by - 10 + flap);
  ctx.quadraticCurveTo(bx + 6, by - 3, bx - 4, by - 3);
  ctx.fill();

  // тело
  ctx.fillStyle = '#E65100';
  ctx.beginPath();
  ctx.ellipse(bx, by, 14, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // хвост
  ctx.fillStyle = '#BF360C';
  ctx.beginPath();
  ctx.moveTo(bx + 11, by);
  ctx.lineTo(bx + 23, by - 5);
  ctx.lineTo(bx + 23, by + 6);
  ctx.closePath();
  ctx.fill();

  // клюв
  ctx.fillStyle = '#FFD54F';
  ctx.beginPath();
  ctx.moveTo(bx - 13, by - 1);
  ctx.lineTo(bx - 22, by - 3);
  ctx.lineTo(bx - 13, by + 4);
  ctx.closePath();
  ctx.fill();

  // глаз
  ctx.fillStyle = '#212121';
  ctx.beginPath(); ctx.arc(bx - 6, by - 1, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(bx - 5.5, by - 1.5, 1, 0, Math.PI * 2); ctx.fill();
}

// ═══════════════════════════════════════════════════════════════
// РЕНДЕР
// ═══════════════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  // препятствия и птицы
  obstacles.forEach(o => {
    if (o.isBird) {
      if (imgOk(IMG_BIRD)) {
        ctx.drawImage(IMG_BIRD, o.x, o.y, o.w, o.h);
      } else {
        drawBirdPlaceholder(o);
      }
    } else {
      const imgs = [IMG_OBS1, IMG_OBS2, IMG_OBS3];
      if (imgOk(imgs[o.type])) {
        ctx.drawImage(imgs[o.type], o.x, o.y, o.w, o.h);
      } else {
        drawObsPlaceholder(o);
      }
    }
  });

  // герой
  if (imgOk(IMG_HERO)) {
    ctx.save();
    ctx.translate(hero.x + 28, hero.y + 62);
    ctx.scale(hero.squash > 1 ? hero.squash : 1, hero.squash < 1 ? hero.squash : 1);
    ctx.translate(-28, -62);
    ctx.drawImage(IMG_HERO, 0, 0, 56, 62);
    ctx.restore();
  } else {
    drawHeroPlaceholder(hero.x, hero.y, hero.onGround, hero.legPhase, hero.squash);
  }

  drawHUD();

  if (gs === 'wait') drawOverlay('🐰', 'Беги, зверюшка!', 'Нажми пробел или тапни — и вперёд!');
  if (gs === 'dead') drawOverlay('😢', 'Счёт: ' + Math.floor(score), 'Тапни чтобы попробовать снова!');
}

function loop() { update(); render(); requestAnimationFrame(loop); }

// ── Управление ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
cv.addEventListener('pointerdown', e => { e.preventDefault(); jump(); });

loop();
</script>
</body>
</html>
